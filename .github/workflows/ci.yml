name: CI

on:
  pull_request:
  push:
    branches: ['main']

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check release metadata drift
        run: npm run check:release-meta

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Smoke critical routes
        run: npm run smoke
