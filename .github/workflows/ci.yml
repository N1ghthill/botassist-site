name: CI

on:
  pull_request:
  push:
    branches: ['main']

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check release metadata drift
        run: npm run check:release-meta

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
